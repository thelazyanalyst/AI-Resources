        let currentCategory = 'all';
        let currentDifficulty = 'all';
        let currentSearch = '';

        const searchInput = document.getElementById('searchInput');
        const categoryButtons = document.querySelectorAll('#categoryFilters .filter-btn');
        const difficultyButtons = document.querySelectorAll('#difficultyFilters .filter-btn');
        const resultsContainer = document.getElementById('resultsContainer');
        const statsDiv = document.getElementById('stats');

        // Event listeners
        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value.toLowerCase();
            renderResults();
        });

        categoryButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.filter;
                renderResults();
            });
        });

        difficultyButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                difficultyButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDifficulty = btn.dataset.difficulty;
                renderResults();
            });
        });

        function filterResources() {
            return resources.filter(resource => {
                const matchesCategory = currentCategory === 'all' || resource.category === currentCategory;
                const matchesDifficulty = currentDifficulty === 'all' || resource.difficulty === currentDifficulty;
                const matchesSearch = currentSearch === '' ||
                    resource.title.toLowerCase().includes(currentSearch) ||
                    resource.description.toLowerCase().includes(currentSearch) ||
                    resource.category.toLowerCase().includes(currentSearch) ||
                    resource.owner.toLowerCase().includes(currentSearch) ||
                    (resource.difficulty && resource.difficulty.toLowerCase().includes(currentSearch));
                return matchesCategory && matchesDifficulty && matchesSearch;
            });
        }

        function renderResults() {
            const filtered = filterResources();

            if (filtered.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="empty-state">
                        <h3>No resources found</h3>
                        <p>Try adjusting your search or filter criteria</p>
                    </div>
                `;
                statsDiv.textContent = `0 results`;
                return;
            }

            // Group by category
            const grouped = {};
            filtered.forEach(resource => {
                if (!grouped[resource.category]) {
                    grouped[resource.category] = [];
                }
                grouped[resource.category].push(resource);
            });

            let html = '';
            Object.keys(grouped).sort().forEach(category => {
                html += `<div class="category">
                    <h3 class="category-title">${category}</h3>`;

                grouped[category].forEach(resource => {
                    const imageHtml = resource.image ? `
                        <div class="resource-image">
                            <img src="${resource.image}" alt="${resource.title}" onerror="this.style.display='none'">
                        </div>
                    ` : '';

                    html += `
                        <div class="resource">
                            <div class="resource-content">
                                <a href="${resource.url}" target="_blank" rel="noopener noreferrer">
                                    ${resource.title}
                                </a>
                                <p class="resource-description">${resource.description}</p>
                                <p class="resource-owner">📌 ${resource.owner}</p>
                                <span class="resource-category">${resource.category}</span>
                                ${resource.difficulty ? `<span class="resource-difficulty difficulty-${resource.difficulty.toLowerCase()}">${resource.difficulty}</span>` : ''}
                            </div>
                            ${imageHtml}
                        </div>
                    `;
                });

                html += `</div>`;
            });

            resultsContainer.innerHTML = html;
            statsDiv.textContent = `${filtered.length} resource${filtered.length !== 1 ? 's' : ''} found`;
        }

        // Initial render
        renderResults();
    </script>
